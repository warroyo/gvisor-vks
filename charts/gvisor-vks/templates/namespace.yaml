{{- if .Values.namespace.create }}
{{- if eq (include "gvisor-vks.namespace" .) .Release.Namespace }}
{{- fail "namespace.create=true requires namespace.name != the release namespace: the privileged workload namespace must be decoupled from the release namespace (helm-controller owns the release namespace)" }}
{{- end }}
# Privileged workload namespace for the installer DaemonSet. The installer is a
# privileged, host-mounting pod; VKS enforces PSA "restricted" by default, so
# its namespace must be "privileged". Helm applies Namespace first, so the
# labels exist before the DS pods are admitted.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "gvisor-vks.namespace" . }}
  labels:
    {{- include "gvisor-vks.labels" . | nindent 4 }}
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
