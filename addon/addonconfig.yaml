# AddonConfig — Helm value overrides. Replace <cluster-namespace>. The
# addonConfigDefinitionRef is set by the controller, not the user. See README.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonConfig
metadata:
  name: gvisor-vks
  namespace: <cluster-namespace>
spec:
  values:
    # Release namespace (bookkeeping only, no pods). Must differ from the
    # workload namespace below. gvisor-addon must exist before install
    # (helm-controller createNamespace, or pre-create it). See README.
    helmOptions:
      targetNamespace: gvisor-addon
    helmValues:
      # Chart creates the privileged workload namespace for the DaemonSet.
      namespace:
        create: true
        name: gvisor-system
      nodeSelector:
        gvisor: enabled
