# AddonConfig — Helm value overrides. Replace <cluster-namespace>. The
# addonConfigDefinitionRef is set by the controller, not the user. See README.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonConfig
metadata:
  name: gvisor-vks
  namespace: <cluster-namespace>
spec:
  values:
    helmOptions:
      targetNamespace: gvisor-system
    helmValues:
      nodeSelector:
        gvisor: enabled
