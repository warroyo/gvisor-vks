# AddonInstall — installs the release into the target cluster. Lives in the
# cluster namespace (same as AddonConfig). Replace <cluster-namespace>.
# clusters: [] installs on ALL clusters in the namespace; releaseFilter.ref.name
# pins the version as <addon>.<version>. See README.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: gvisor-vks-install
  namespace: <cluster-namespace>
spec:
  addonRef:
    name: gvisor-vks
  releaseFilter:
    ref:
      name: gvisor-vks.0.3.0   # <addon>.<version>; omit releaseFilter for latest
  stopMatchingBehavior: Retain
  # Selects Cluster objects labeled gvisor: enabled (on the Supervisor). This is
  # the CLUSTER label, distinct from the node-pool label of the same name. Label
  # the target Cluster, or use clusters: [] to install on all clusters.
  clusters:
    - selector:
        matchLabels:
          gvisor: enabled
