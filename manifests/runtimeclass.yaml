# RuntimeClass pods reference to run sandboxed under gVisor.
# Usage in a pod spec:  spec.runtimeClassName: gvisor
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc        # matches containerd runtimes.runsc registered by the installer
# Pin gvisor pods to the pool where runsc is installed. The RuntimeClass
# admission controller injects this nodeSelector into every pod that sets
# runtimeClassName: gvisor, so they only schedule onto gvisor=enabled nodes.
scheduling:
  nodeSelector:
    gvisor: enabled
