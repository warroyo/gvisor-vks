name: build-image

on:
  push:
    branches: [main]
    paths:
      - 'image/**'
      - '.github/workflows/build-image.yml'
    tags: ['v*']
  pull_request:
    paths:
      - 'image/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      gvisor_release:
        description: 'gVisor release to bake in (e.g. 20240101.0 or latest)'
        default: latest
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gvisor-installer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Skip login on PRs from forks (no push, read-only).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: image
          file: image/Dockerfile
          platforms: linux/amd64        # VKS is x86_64 only
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GVISOR_RELEASE=${{ github.event.inputs.gvisor_release || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
