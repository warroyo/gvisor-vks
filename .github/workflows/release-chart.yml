name: release-chart

# Publishes charts/gvisor-vks to the GitHub Pages Helm repo via chart-releaser.
# See README (Developing > CI) for the version-bump rule and Pages setup.

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/release-chart.yml'
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push gh-pages branch + create releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # chart-releaser needs full history

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
